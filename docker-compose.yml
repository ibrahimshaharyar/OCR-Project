# ============================================
# Docker Compose — OCR Receipt Extraction Tool
# ============================================
# Quick local development setup
# Usage: docker-compose up --build
# ============================================

version: "3.8"

services:
  # ============================================
  # FastAPI Backend (OCR API)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: receipt-ocr-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist output files on the host machine
      - ./outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
